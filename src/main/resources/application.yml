server:
  port: 8084

spring:
  application:
    name: myclients-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/demoappdb}
    username: ${DB_USER:demoappuser}
    password: ${DB_PASSWORD:demoapp123}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

logging:
  level:
    org.hibernate.SQL: INFO

admin:
  auth:
    session-ttl-minutes: ${ADMIN_SESSION_TTL_MINUTES:120}

app:
  media-root: ${MEDIA_ROOT:media}
